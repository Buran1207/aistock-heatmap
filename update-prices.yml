name: Update AI stock heatmap prices

on:
  workflow_dispatch:
  schedule:
    # 亚洲收盘后：A/H/TW/JP/KR 均已收盘，UTC 08:25 ≈ 北京时间 16:25
    - cron: "25 8 * * 1-5"
    # 美股收盘后：兼容夏令时/冬令时，UTC 22:20 均在美股收盘之后
    - cron: "20 22 * * 1-5"

permissions:
  contents: write

concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Detect close batch
        run: |
          HOUR_UTC=$(date -u +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "PRICE_BATCH=MANUAL" >> "$GITHUB_ENV"
          elif [ "$HOUR_UTC" -ge 6 ] && [ "$HOUR_UTC" -lt 14 ]; then
            echo "PRICE_BATCH=ASIA_CLOSE" >> "$GITHUB_ENV"
          else
            echo "PRICE_BATCH=US_CLOSE" >> "$GITHUB_ENV"
          fi
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"

      - name: Fetch latest prices
        run: python fetch_prices.py

      - name: Print price diagnostics
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          m = json.loads(Path('prices_manifest.json').read_text(encoding='utf-8'))
          print('batch:', m.get('batch'), m.get('batch_label'))
          print('generated_at:', m.get('generated_at'))
          print('current_file:', m.get('current_file'))
          print('total:', m.get('total_symbols'), 'loaded:', m.get('loaded_symbols'), 'missing:', m.get('missing_symbols'), 'partial:', m.get('price_only_symbols'))
          PY

      - name: Commit updated prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git add prices.json prices_manifest.json prices_archive/
          if git diff --cached --quiet; then
            echo "No price changes to commit."
          else
            git commit -m "Update close-batch prices"
            git push
          fi
